<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <!-- <link rel="stylesheet" href="bootstrap.css"> -->
    <link rel="stylesheet" href="styles.css">
    <title>Tranport Department</title>
</head>

<body>

    <div id="header" class="container-fluid">
        <nav class="navbar navbar-light">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-4">
                        <a class="navbar-brand" href="#">
                            <img src="/Frontend/Images/image.png" alt="" width="145"
                                class="d-inline-block align-text-top">
                        </a>
                    </div>
                    <div class="col-8 my-4">
                        <p class="text-center fs-3 lh-1 fw-bold mb-1 mt-1">Transport Department</p>
                        <p class="text-center fs-6 lh-1 fw-bold mb-0">Govt. of NCT of Delhi</p>
                    </div>
                </div>
                <img src="/Frontend/Images/puc.png" width="185">
        </nav>
    </div>

    <div id="navbar" class="container-fluid">
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container-fluid">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavDropdown">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#">Home</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>

    <div class="container d-flex justify-content-center">


        <div class="card shadow-lg my-5" style="width: 26rem; border-radius: 12px; overflow: hidden; border: none;">

            <div class="card-body text-center text-white py-4" style="background-color: #212529;">
                <div class="mb-2">
                    <i class="fas fa-gas-pump fa-3x text-warning"></i>
                </div>
                <h3 class="card-title fw-bold mb-0">Station ID: FS-DL-104</h3>
                <p class="card-text small mb-0" style="opacity: 0.8;">Fuel Station Emissions Tracker</p>
            </div>

            <ul class="list-group list-group-flush">

                <li class="list-group-item d-flex justify-content-between align-items-center py-4">
                    <div class="d-flex align-items-center">
                        <div class="bg-success bg-opacity-10 text-success rounded-circle d-flex justify-content-center align-items-center me-3"
                            style="width: 40px; height: 40px;">
                            <i class="fas fa-check-circle fs-5"></i>
                        </div>
                        <span class="fw-bold text-dark fs-6">Vehicles With PUCC</span>
                    </div>
                    <span class="badge bg-success rounded-pill px-3 py-2 fs-6 shadow-sm">450</span>
                </li>

                <li class="list-group-item d-flex justify-content-between align-items-center py-4">
                    <div class="d-flex align-items-center">
                        <div class="bg-danger bg-opacity-10 text-danger rounded-circle d-flex justify-content-center align-items-center me-3"
                            style="width: 40px; height: 40px;">
                            <i class="fas fa-times-circle fs-5"></i>
                        </div>
                        <span class="fw-bold text-dark fs-6">Vehicles Without PUCC</span>
                    </div>
                    <span class="badge bg-danger rounded-pill px-3 py-2 fs-6 shadow-sm">85</span>
                </li>

            </ul>

            <div class="card-footer bg-white text-center py-4 border-top-0">
                <button
                    class="btn btn-primary w-100 py-2 fw-bold shadow-sm d-flex justify-content-center align-items-center gap-2">
                    <i class="fas fa-cloud-upload-alt"></i> Submit numbers to govt.
                </button>
                <div class="text-muted small mt-2">
                    <i class="fas fa-info-circle me-1"></i> Data will be securely transmitted via API.
                </div>
            </div>
        </div>
    </div>
</body>

</html>
