<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <!-- <link rel="stylesheet" href="bootstrap.css"> -->
    <link rel="stylesheet" href="styles.css">
    <title>Tranport Department</title>
</head>

<body>

    <div id="header" class="container-fluid">
        <nav class="navbar navbar-light">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-4">
                        <a class="navbar-brand" href="#">
                            <img src="/Frontend/Images/image.png" alt="" width="145"
                                class="d-inline-block align-text-top">
                        </a>
                    </div>
                    <div class="col-8 my-4">
                        <p class="text-center fs-3 lh-1 fw-bold mb-1 mt-1">Transport Department</p>
                        <p class="text-center fs-6 lh-1 fw-bold mb-0">Govt. of NCT of Delhi</p>
                    </div>
                </div>
                <img src="/Frontend/Images/puc.png" width="185">
        </nav>
    </div>

    <div id="navbar" class="container-fluid">
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container-fluid">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavDropdown">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Register Center</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Availability</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Pricing</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>

    <div class="container  my-4">

        <div class="row">
            <div class="col-5">

                <div class="card shadow px-0 mb-4" style="width: 24rem; border-radius: 15px; overflow: hidden;">

                    <div class="card-body text-center text-white py-4" style="background-color: #4b49ac;">
                        <h3 id="name" class="card-title fw-bold mb-0"></h3>
                        <p class="card-text small mb-0" style="opacity: 0.9;">Authorized PUCC Vendor</p>
                    </div>

                    <ul class="list-group list-group-flush">

                        <li class="list-group-item d-flex justify-content-between align-items-center py-3">
                            <span class="fw-bold">Vendor No.</span>
                            <span id="vendor_no" class="text-secondary text-end"></span>
                        </li>

                        <li class="list-group-item d-flex justify-content-between align-items-center py-3">
                            <span class="fw-bold">GST No.</span>
                            <span id="gstin" class="text-secondary text-end font-monospace"></span>
                        </li>

                        <li class="list-group-item d-flex justify-content-between align-items-center py-3">
                            <span class="fw-bold">Checks for</span>
                            <span id="type_" class="text-secondary text-end font-monospace"></span>
                        </li>

                        <li class="list-group-item d-flex justify-content-between py-3">
                            <span class="fw-bold">Location</span>
                            <div id="location" class="text-secondary text-end" style="font-size: 0.95rem;"></div>
                        </li>

                        <li class="list-group-item d-flex justify-content-between align-items-center py-3">
                            <span class="fw-bold">Total PUCC Issued</span>
                            <span id="total_pucc_issued" class="badge bg-success rounded-pill px-3 fs-6"></span>
                        </li>

                    </ul>
                </div>
            </div>

            <div class="col-7">
                <div class="card shadow" style="border-radius: 10px; overflow: hidden; border: none;">

                    <div class="card-body text-white py-3 d-flex justify-content-between align-items-center"
                        style="background-color: #fd7e14;">
                        <h5 class="card-title fw-bold mb-0"><i class="far fa-calendar-check me-2"></i>Appointments</h5>
                        <span id="appointment_num" class="badge bg-light text-dark rounded-pill"></span>
                    </div>

                    <ul id="appointments" class="list-group list-group-flush">
<!-- 
                        <li class="list-group-item d-flex justify-content-between align-items-center py-3">
                            <div>
                                <div class="d-flex align-items-center gap-2 mb-1">
                                    <div class="fw-bold text-dark fs-5"></div>
                                    <span class="badge border text-bg-primary text-dark rounded-pill"
                                        style="font-size: 0.7rem;"></span>
                                </div>
                                <div class="text-secondary small">
                                    <i class="far fa-calendar-alt me-1"></i>
                                </div>
                            </div>

                            <span class="badge bg-light border text-dark rounded-pill px-3 py-2 shadow-sm">
                                <i class="far fa-clock text-warning me-1"></i> 
                            </span>
                        </li> -->
                    </ul>
                </div>
            </div>

            <div class="card shadow" style="border-radius: 10px; overflow: hidden; border: none;">
                <div class="card-body py-4 d-flex align-items-center justify-content-between">
                    <div>
                        <p class="text-secondary small fw-bold mb-1 text-uppercase tracking-wide">Total Revenue</p>
                        <h2 id="total_rev" class="fw-bold mb-0 text-dark">₹ 0</h2>
                    </div>
                    <div class="bg-success bg-opacity-10 text-success rounded-circle d-flex align-items-center justify-content-center"
                        style="width: 60px; height: 60px;">
                        <i class="fas fa-wallet fa-2x"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        fetch("http://localhost:3000/load_vendor")
            .then(response => response.json())
            .then(data => {
                document.getElementById('vendor_no').innerHTML = data.number;
                document.getElementById('name').innerHTML = data.name;
                document.getElementById('gstin').innerHTML = data.gstin;

                let cat = "";

                for (let i = 0; i < data.type.length; i++) {
                    cat = cat + data.type[i] + " ";
                }

                document.getElementById('type_').innerHTML = cat;
                document.getElementById('location').innerHTML = data.location;
                document.getElementById('total_pucc_issued').innerHTML = data.total_pucc;

                let count = 0;
                for (let j = 0; j < data.appointments.length; j++){
                    count++;
                    let div = document.createElement('div');
    
                    let div0 = document.createElement('div');
                    div0.className = 'd-flex align-items-center gap-2 mb-1';
    
                    let div1 = document.createElement('div');
                    div1.className = 'fw-bold text-dark fs-5';
                    div1.innerHTML = data.appointments[j].vehicle_no;
    
                    let span1 = document.createElement('span');
                    span1.className = 'badge border text-bg-primary text-dark rounded-pill style="font-size: 0.7rem"';
                    span1.innerHTML = data.appointments[j].fuel;
    
                    let i = document.createElement('i');
                    i.className = 'far fa-calendar-alt me-1';
                    i.innerHTML = data.appointments[j].time.split('T')[0];
    
                    let div2 = document.createElement('div');
                    div2.className = 'text-secondary small';

                    let span = document.createElement('span');
                    span.className = 'badge bg-light border text-dark rounded-pill px-3 py-2 shadow-sm';
                    span.innerHTML = data.appointments[j].time.split('T')[1].split('.000Z')[0];

                    let i_ = document.createElement('i');
                    i_.className = 'far fa-clock text-warning me-1';
    
                    div0.appendChild(div1);
                    div0.appendChild(span1);
                    div.appendChild(div0);
    
                    span.appendChild(i_);
                    
                    div.appendChild(div2);
                    div.appendChild(span);
                    div2.appendChild(i);
    
                    let li = document.createElement('li');
                    li.className = 'list-group-item d-flex justify-content-between align-items-center py-3';
                    li.appendChild(div);
                    li.appendChild(div2);
    
                    document.getElementById('appointments').appendChild(li);
                }

                document.getElementById('total_rev').innerHTML = "₹ " + data.total_revenue;

                document.getElementById('appointment_num').innerHTML = count;
            });
    </script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
