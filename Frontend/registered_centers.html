    <div id="body" class="container d-flex justify-content-center">
        <table class="table table-hover my-4">
            <thead class="thead-dark" >
                <tr>
                    <th scope="col">Vendor No.</th>
                    <th scope="col">Vendor Name</th>
                    <th scope="col">GSTIN No.</th>
                    <th scope="col">Location</th>
                </tr>
            </thead>
            <tbody id = "main_table">

            </tbody>
        </table>
    </div>

    <script>
        fetch('http://localhost:3000/registered_vendors')
            .then(response => response.json())
            .then(data => {
                data.forEach((data, index) => {
                   const tr = document.createElement('tr');
                   const th = document.createElement('th'); 
                   const td1 = document.createElement('td');
                   const td2 = document.createElement('td');
                   const td3 = document.createElement('td');
                   
                   th.appendChild(document.createTextNode(data.Vendor_No));
                   td1.appendChild(document.createTextNode(data.Name));
                   td2.appendChild(document.createTextNode(data.GST_No));
                   td3.appendChild(document.createTextNode(data.Location));

                   tr.appendChild(th);
                   tr.appendChild(td1);
                   tr.appendChild(td2);
                   tr.appendChild(td3);

                   const parent = document.getElementById('main_table');

                   parent.appendChild(tr);
                });
            });
    </script>
