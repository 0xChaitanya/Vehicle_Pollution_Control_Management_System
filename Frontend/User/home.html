<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <!-- <link rel="stylesheet" href="bootstrap.css"> -->
    <link rel="stylesheet" href="styles.css">
    <title>Tranport Department</title>
</head>

<body>

    <div id="header" class="container-fluid">
        <nav class="navbar navbar-light">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-4">
                        <a class="navbar-brand" href="#">
                            <img src="/Frontend/Images/image.png" alt="" width="145"
                                class="d-inline-block align-text-top">
                        </a>
                    </div>
                    <div class="col-8 my-4">
                        <p class="text-center fs-3 lh-1 fw-bold mb-1 mt-1">Transport Department</p>
                        <p class="text-center fs-6 lh-1 fw-bold mb-0">Govt. of NCT of Delhi</p>
                    </div>
                </div>
                <img src="/Frontend/Images/puc.png" width="185">
        </nav>
    </div>

    <div id="navbar" class="container-fluid">
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container-fluid">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavDropdown">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="home.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="register_for_pucc.html">Apply for PUCC</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="renew_pucc.html">Renew Certificate</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>

    <div class="container  my-4">

        <div class="row">

            <div class="col-5">
                <div class="card shadow mb-4" style="width: 24rem; border-radius: 15px; overflow: hidden;">

                    <div class="card-body text-center bg-primary text-white py-3">
                        <div class="mb-3">
                            <i class="fas fa-user-circle fa-5x"></i>
                        </div>
                        <h4 id="NAME" class="card-title fw-bold mb-0"></h4>
                        <p class="card-text small opacity-75">Vehicle Owner</p>
                    </div>

                    <ul class="list-group list-group-flush">

                        <li class="list-group-item d-flex justify-content-between align-items-center py-3">
                            <span><i class="fas fa-id-card text-primary me-2"></i><strong>Adhaar No.</strong></span>
                            <span id="ADHAAR_NO" class="text-secondary text-end"></span>
                        </li>

                        <li class="list-group-item d-flex justify-content-between align-items-center py-3">
                            <span><i class="fas fa-phone text-primary me-2"></i><strong>Contact No.</strong></span>
                            <span id="CONTACT_NO" class="text-secondary text-end"></span>
                        </li>

                        <li class="list-group-item d-flex justify-content-between py-3">
                            <span class="fw-bold">Home Address</span>
                            <div id="HOME_ADDR" class="text-secondary text-end" style="font-size: 0.95rem;">
                                45B Model Town, Phase 2<br>
                                New Delhi, India 110009
                            </div>
                        </li>
                    </ul>
                </div>
            </div>

            <div class="col-7">
                <div class="card shadow" style="border-radius: 10px; overflow: hidden; border: none;">

                    <div class="card-body text-white py-3 d-flex justify-content-between align-items-center"
                        style="background-color: #34a853;">
                        <h5 class="card-title fw-bold mb-0">Owned Vehicles</h5>
                        <span id="number_of_vehicle" class="badge bg-light text-dark rounded-pill"></span>
                    </div>

                    <ul id="vehicle_list" class="list-group list-group-flush">

                        <!-- <li id="vehicle_items" class="list-group-item d-flex justify-content-between align-items-center py-3">
                            <div>
                                <div id="vehicle_number" class="fw-bold text-dark"></div>
                            </div>
                            <span id="vehicle_type" class="badge text-bg-primary rounded-pill px-3"></span>
                        </li> -->

                    </ul>
                </div>
            </div>
        </div>

        <div class="card shadow" style="border-radius: 10px; overflow: hidden; border: none;">
            <div class="card-body text-white py-3 d-flex justify-content-between align-items-center"
                style="background-color: #0dcaf0;">
                <h5 class="card-title fw-bold mb-0 text-white">PUCC Status</h5>
                <i class="fas fa-leaf text-dark"></i>
            </div>

            <ul id="pucc_status" class="list-group list-group-flush">
                <!-- <li class="list-group-item d-flex justify-content-between align-items-center py-3">
                    <div>
                        <div class="fw-bold text-dark"></div>
                        <div class="text-secondary small"></div>
                    </div>
                    <span class="badge bg-success rounded-pill px-3"></span>
                </li> -->
            </ul>
        </div>
    </div>

    <script>
        fetch("http://localhost:3000/load_user")
            .then(response => response.json())
            .then(data => {
                document.getElementById('NAME').innerHTML = data.name;
                document.getElementById('ADHAAR_NO').innerHTML = data.adhaar;
                document.getElementById('CONTACT_NO').innerHTML = "+91 " + data.contact;
                document.getElementById('HOME_ADDR').innerHTML = data.home_addr;

                for (let i = 0; i < data.vehicle.length; i++) {
                    var div = document.createElement('div');
                    div.className = 'fw-bold text-dark';
                    div.innerHTML = data.vehicle[i].number;

                    var span = document.createElement('span');
                    span.className = 'badge rounded-pill text-bg-primary text-dark border px-3';
                    span.innerHTML = data.vehicle[i].fuel_type;

                    var top = document.createElement('li');
                    top.className = 'list-group-item d-flex justify-content-between align-items-center py-3'

                    top.appendChild(div);
                    top.appendChild(span);
                    var parent = document.getElementById('vehicle_list');
                    parent.appendChild(top);
                }

                document.getElementById('number_of_vehicle').innerHTML = data.vehicle.length;

                //---------------------------pucc card---------------------------------
                for (let i = 0; i < data.pending_pucc.length; i++){
                    var div = document.createElement('div');
                
                    var div1 = document.createElement('div');
                    div1.className = 'fw-bold text-dark';
                    div1.innerHTML = data.pending_pucc[i].pucc_no;
                
                    var span = document.createElement('span');
                    
                    span.className = 'badge bg-info rounded-pill px-3';
                    span.innerHTML = "Pending Approval";
                
                    div.appendChild(div1);
                
                    var li = document.createElement('li');
                    li.className = 'list-group-item d-flex justify-content-between align-items-center py-3';
                    li.appendChild(div);
                    li.appendChild(span);
                
                    document.getElementById('pucc_status').appendChild(li);
                }

                for (let i = 0; i < data.pucc.length; i++){
                    var div = document.createElement('div');
    
                    var div1 = document.createElement('div');
                    div1.className = 'fw-bold text-dark';
                    div1.innerHTML = data.pucc[i].number;

                    var div2 = document.createElement('div');
                    div2.className = 'text-secondary small';
                    div2.innerHTML = "Issued On : " + data.pucc[i].issued_on.split('T')[0];

                    var div3 = document.createElement('div');
                    div3.className = 'text-secondary small';
                    div3.innerHTML = "Validity : " + data.pucc[i].validity.split('T')[0];
                    
                    var span = document.createElement('span');
                    
                    if (data.pucc[i].status == "a"){
                        span.className = 'badge bg-success rounded-pill px-3';
                        span.innerHTML = "Active";
                    }
                    else if (data.pucc[i].status == "e"){
                        span.className = 'badge bg-danger rounded-pill px-3';
                        span.innerHTML = "Expired";
                    }
                    
                    div.appendChild(div1);
                    div.appendChild(div2);
                    div.appendChild(div3);
                    
                    var li = document.createElement('li');
                    li.className = 'list-group-item d-flex justify-content-between align-items-center py-3';
                    li.appendChild(div);
                    li.appendChild(span);
                    
                    document.getElementById('pucc_status').appendChild(li);
                }
                
            });
            </script>


    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
