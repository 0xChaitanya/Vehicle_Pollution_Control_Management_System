<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <!-- <link rel="stylesheet" href="bootstrap.css"> -->
    <link rel="stylesheet" href="styles.css">
    <title>Tranport Department</title>
</head>

<body>

    <div id="header" class="container-fluid">
        <nav class="navbar navbar-light">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-4">
                        <a class="navbar-brand" href="#">
                            <img src="/Frontend/Images/image.png" alt="" width="145" class="d-inline-block align-text-top">
                        </a>
                    </div>
                    <div class="col-8 my-4">
                        <p class="text-center fs-3 lh-1 fw-bold mb-1 mt-1">Transport Department</p>
                        <p class="text-center fs-6 lh-1 fw-bold mb-0">Govt. of NCT of Delhi</p>
                    </div>
                </div>
                <img src="/Frontend/Images/puc.png" width="185">
        </nav>
    </div>

    <div id="navbar" class="container-fluid">
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container-fluid">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavDropdown">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Apply for PUCC</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Renew certificate</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>

    <div class="container d-flex justify-content-center my-4">

        <div class="col-md-7 col-lg-8">

            <h4 class="mb-3">Renew your PUCC</h4>

            <form>

                <div class="row g-3">

                    <div class="col-12">
                        <label class="form-label">Registration Number (PUCC Number) *</label>
                        <input type="text" class="form-control">
                    </div>

                </div>


                <hr class="my-4">

                <h4 class="mb-3">Preferred center *</h4>

                <select class="form-select">

                    <option selected>Select Center</option>
                    <option>Center 1</option>
                    <option>Center 2</option>
                    <option>Center 3</option>

                </select>


                <br class="my-4">

                <h4 class="mb-3">Preferred Date and Time *</h4>

                <div class="row g-3">

                    <div class="col-md-6">
                        <select class="form-select" id="dateSelect">
                            <option selected disabled>Select Date</option>
                            <option value="2026-03-10">10 Mar 2026</option>
                            <option value="2026-03-11">11 Mar 2026</option>
                            <option value="2026-03-12">12 Mar 2026</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <select class="form-select" id="slotSelect">
                            <option selected disabled>Select Slot</option>
                        </select>
                    </div>

                </div>

                <hr class="my-4">

                <button class="w-100 btn btn-primary btn-lg">Apply</button>

            </form>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>

        const slots = {

            "2026-03-10": [
                "09:00 - 09:30",
                "10:00 - 10:30",
                "11:00 - 11:30"
            ],

            "2026-03-11": [
                "12:00 - 12:30",
                "13:00 - 13:30",
                "14:00 - 14:30"
            ],

            "2026-03-12": [
                "15:00 - 15:30",
                "16:00 - 16:30"
            ]

        };


        document.getElementById("dateSelect").addEventListener("change", function () {

            let date = this.value;
            let slotSelect = document.getElementById("slotSelect");

            slotSelect.innerHTML = '<option selected disabled>Select Slot</option>';

            slots[date].forEach(function (slot) {

                let option = document.createElement("option");
                option.text = slot;
                option.value = slot;

                slotSelect.appendChild(option);

            });

        });

    </script>

</body>

</html>
