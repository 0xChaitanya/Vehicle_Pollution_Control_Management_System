<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <!-- <link rel="stylesheet" href="bootstrap.css"> -->
    <link rel="stylesheet" href="styles.css">
    <title>Tranport Department</title>
</head>

<body>

    <div id="header" class="container-fluid">
        <nav class="navbar navbar-light">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-4">
                        <a class="navbar-brand" href="#">
                            <img src="/Frontend/Images/image.png" alt="" width="145"
                                class="d-inline-block align-text-top">
                        </a>
                    </div>
                    <div class="col-8 my-4">
                        <p class="text-center fs-3 lh-1 fw-bold mb-1 mt-1">Transport Department</p>
                        <p class="text-center fs-6 lh-1 fw-bold mb-0">Govt. of NCT of Delhi</p>
                    </div>
                </div>
                <img src="/Frontend/Images/puc.png" width="185">
        </nav>
    </div>

    <div id="navbar" class="container-fluid">
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container-fluid">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavDropdown">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link" aria-current="page" href="home.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="register_for_pucc.html">Apply for PUCC</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="renew_pucc.html">Renew certificate</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>




    <div class="container d-flex justify-content-center my-4">

        <div class="col-md-7 col-lg-8">

            <h4 class="mb-3">Apply for a new PUCC</h4>

            <form>

                <div class="row g-3">

                    <div class="col-sm-6">
                        <label class="form-label">First name *</label>
                        <input type="text" class="form-control" required>
                    </div>

                    <div class="col-sm-6">
                        <label class="form-label">Last name</label>
                        <input type="text" class="form-control">
                    </div>


                    <div class="col-12">
                        <label class="form-label">Adhaar Number *</label>
                        <input type="text" class="form-control" required>
                    </div>


                    <div class="col-12">
                        <label class="form-label">Contact *</label>
                        <input type="text" class="form-control" required>
                    </div>


                    <div class="col-12">
                        <label class="form-label">Vehicle No *</label>
                        <input type="text" class="form-control" required>
                    </div>


                    <div class="col-12">
                        <label class="form-label">Address *</label>
                        <input type="text" class="form-control" required>
                    </div>


                    <div class="col-md-3">
                        <label class="form-label">Zip</label>
                        <input type="text" class="form-control">
                    </div>

                </div>


                <hr class="my-4">

                <h4 class="mb-3">Preferred center *</h4>

                <select id="vendor_select" class="form-select">
                    <option selected>Select Center</option>
                </select>

                <br class="my-4">

                <h4 class="mb-3">Preferred Date and Time *</h4>

                <div class="row g-3">

                    <div class="col-md-6">
                        <select class="form-select" id="dateSelect">
                            <option selected disabled>Select Date</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <select class="form-select" id="slotSelect">
                            <option selected disabled>Select Slot</option>
                        </select>
                    </div>

                </div>

                <hr class="my-4">

                <button id="btnok" class="w-100 btn btn-primary btn-lg">Apply</button>

            </form>

        </div>

    </div>

    <script>

        const slots = {

            "2026-03-10": [
                "09:00 - 09:30",
                "10:00 - 10:30",
                "11:00 - 11:30"
            ],

            "2026-03-11": [
                "12:00 - 12:30",
                "13:00 - 13:30",
                "14:00 - 14:30"
            ],

            "2026-03-12": [
                "15:00 - 15:30",
                "16:00 - 16:30"
            ]

        };

        var main = document.getElementById('vendor_select');
        let loaded = false;

        main.addEventListener("mouseover", function () {
            if (loaded) return;
            loaded = true;

            fetch("http://localhost:3000/registered_vendors")
                .then(response => response.json())
                .then(data => {
                    for (let i = 0; i < data.length; i++) {
                        var option = document.createElement('option');
                        option.innerHTML = data[i].Vendor_No + " , " + data[i].Name + " , " + data[i].Location;

                        document.getElementById('vendor_select').appendChild(option);
                    }
                });
        });

        async function get_datetime(vendor_no) {
            var returnResponse;
            try {
                returnResponse = await fetch('http://localhost:3000/vendor_time', {
                    method: "POST",

                    body: JSON.stringify({
                        number: vendor_no
                    }),

                    headers: { 'Content-type': 'application/json; charset=UTF-8' }

                });
            }
            catch (error) {
                console.log("Error detected : " + error);
            }

            return returnResponse.json();
        }

        var selectdate = document.getElementById('dateSelect');
        var selectslot = document.getElementById('slotSelect');

        let dateLoaded = false;

        document.getElementById('vendor_select').addEventListener('change', () => {
            dateLoaded = false;
            selectdate.innerHTML = "";
        });

        selectdate.addEventListener('click', async () => {

            if (dateLoaded) return;
            dateLoaded = true;

            selectdate.innerHTML = "";

            var selected = document.getElementById('vendor_select').value;
            var vendor_no = parseInt(selected.split(' , ')[0]);

            var data = await get_datetime(vendor_no);

            var days = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];

            for (let i = 0; i < data.rows.length; i++) {

                let tempDate = new Date();

                for (let j = 0; j < 7; j++) {

                    if (data.rows[i].Day === days[tempDate.getDay()]) {
                        var option = document.createElement('option');
                        option.innerHTML = tempDate.toISOString().split('T')[0];
                        selectdate.appendChild(option);
                    }

                    tempDate.setDate(tempDate.getDate() + 1);
                }
            }
        });

        document.getElementById('vendor_select').addEventListener('change', async () => {

            const slotSelect = document.getElementById('slotSelect');
            slotSelect.innerHTML = "";

            const selected = document.getElementById('vendor_select').value;
            const vendor_no = parseInt(selected.split(' , ')[0]);

            const data = await get_datetime(vendor_no);

            let start_time = data.rows[0].Start_Time;
            const end_time = data.rows[0].End_Time;
            const slot = data.rows[0].Slot_Duration;

            while (timeToMinutes(start_time) <= timeToMinutes(end_time)) {
                const option = document.createElement('option');
                option.innerHTML = start_time;

                slotSelect.appendChild(option);
                start_time = stringTimeAddition(start_time, slot);
            }
        });

        function timeToMinutes(t) {
            const [h, m, s] = t.split(':').map(Number);
            return h * 60 + m + Math.floor(s / 60);
        }

        function stringTimeAddition(s1, s2) {
            // given strings in format HH:MM:SS, this function adds two such strings

            seconds1 = parseInt(s1.split(':')[2]);
            seconds2 = parseInt(s2.split(':')[2]);
            carry1 = Math.floor((seconds1 + seconds2) / 60);
            remainder3 = seconds1 + seconds2 - carry1 * 60;

            minutes1 = parseInt(s1.split(':')[1]);
            minutes2 = parseInt(s2.split(':')[1]);
            carry2 = Math.floor((minutes1 + minutes2 + carry1) / 60);
            remainder2 = minutes1 + minutes2 + carry1 - carry2 * 60;

            hours1 = parseInt(s1.split(':')[0]);
            hours2 = parseInt(s2.split(':')[0]);

            return String(hours1 + hours2 + carry2) + ":" + String(remainder2) + ":" + String(remainder3);
        };

        async function fetchAll() {

            const form = document.querySelector('form');

            const inputs = form.querySelectorAll('input');

            const data = {
                first_name: inputs[0].value,
                last_name: inputs[1].value,
                adhaar: inputs[2].value,
                contact: inputs[3].value,
                vehicle_no: inputs[4].value,
                address: inputs[5].value,
                zip: inputs[6].value,

                vendor: document.getElementById('vendor_select').value,
                date: document.getElementById('dateSelect').value,
                slot: document.getElementById('slotSelect').value
            };

            return data;
        }

        document.getElementById('btnok').addEventListener('click', async () => {
            var returnResponse;
            try {
                returnResponse = await fetch('http://localhost:3000/new_pucc', {
                    method: "POST",

                    body: JSON.stringify(
                        await fetchAll()
                    ),

                    headers: { 'Content-type': 'application/json; charset=UTF-8' }

                });
            }
            catch (error) {
                console.log("Error detected : " + error);
            }

            return returnResponse.json();
        });

    </script>
</body>

</html>
