<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <!-- <link rel="stylesheet" href="bootstrap.css"> -->
    <link rel="stylesheet" href="styles.css">
    <title>Tranport Department</title>
</head>

<body>

    <div id="header" class="container-fluid">
        <nav class="navbar navbar-light">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-4">
                        <a class="navbar-brand" href="#">
                            <img src="/Frontend/Images/image.png" alt="" width="145"
                                class="d-inline-block align-text-top">
                        </a>
                    </div>
                    <div class="col-8 my-4">
                        <p class="text-center fs-3 lh-1 fw-bold mb-1 mt-1">Transport Department</p>
                        <p class="text-center fs-6 lh-1 fw-bold mb-0">Govt. of NCT of Delhi</p>
                    </div>
                </div>
                <img src="/Frontend/Images/puc.png" width="185">
        </nav>
    </div>

    <div id="navbar" class="container-fluid">
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container-fluid">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavDropdown">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Registered Centers</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Check PUCC status</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Contact Us</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>

    <div id="body" class="container-fluid">
        <div class="row">
            <div id="numbers" class="col-9 d-flex align-items-center justify-content-center ps-5 pe-5">

                <div class="row">
                    <div class="col-6 flex-container mb-4">
                        <div class="flex-item">
                            <div class="card h-100" style="border-radius: 15px;">
                                <div class="card-body d-flex justify-content-center bg-info"
                                    style="background-color: #40826D; border-radius: 15px; height: 180px;">
                                    <div class="row">
                                        <h2 class="card-title text-center"
                                            style="font-size: 18px; color: white; border-radius: 15px;">
                                            PUCC Certificates Issued</h2>
                                        <p class="card-text text-center bg-info text-white"><label id="total_pucc"
                                                style="padding:20px 10px 25px 15px;font-size:26px;font-weight:600;border-radius:5px;"></label>
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-6 flex-container mb-4">
                        <div class="flex-item">
                            <div class="card h-100" style="border-radius: 15px;">
                                <div class="card-body bg-info d-flex justify-content-center"
                                    style="background-color: #40826D;  height: 180px;border-radius: 15px;">
                                    <div class="row">

                                        <h2 class="card-title text-center"
                                            style="font-size: 18px; color: white; border-radius: 15px;">
                                            Total Vendors Registered</h2>
                                        <p class="card-text text-center bg-info text-white"><label id="total_vendor"
                                                style="padding:20px 10px 25px 15px;font-size:26px;font-weight:600;border-radius:5px;"></label>
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>

                    <div class="col-6 flex-container">
                        <div class="flex-item">
                            <div class="card h-100" style="border-radius: 15px;">
                                <div class="card-body bg-info d-flex justify-content-center"
                                    style="background-color: #40826D; height: 180px; border-radius: 15px;">
                                    <div class="row">

                                        <h2 class="card-title text-center"
                                            style=" font-size: 18px; color: white; border-radius: 15px;">
                                            PUCC Defaulters</h2>
                                        <p class="card-text text-center bg-info text-white"><label id="pucc_defaulter"
                                                style="padding:20px 10px 25px 15px;font-size:26px;font-weight:600;border-radius:5px;"></label>
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-6 flex-container">
                        <div class="flex-item">
                            <div class="card h-100" style="border-radius: 15px;">
                                <div class="card-body bg-info d-flex justify-content-center"
                                    style="background-color: #40826D;border-radius: 15px;">
                                    <div class="row">
                                        <h2 class="card-title text-center"
                                            style="font-size: 18px; color: white; border-radius: 15px;">
                                            Certificate by Fuel</h2>
                                        <p class="card-text text-center bg-info text-white"><label
                                                style="padding:20px 10px 25px 15px;font-size:16px;font-weight:600;border-radius:5px;">Petrol: <label id="pucc_num_petrol"></label>
                                                <br> Diesel: <label id="pucc_num_diesel"></label> <br> CNG: <label id="pucc_num_cng"></label> </label>
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>



            <div id="login-form" class="col-3 d-flex align-items-center">
                <main class="form-signin w-75">
                    <form>
                        <h1 class="h4 mb-4 fw-normal text-center">Log In</h1>

                        <div class="d-flex justify-content-center mb-4">
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="userRole" id="roleOwner"
                                    value="owner" checked>
                                <label class="form-check-label" for="roleOwner">Owner</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="userRole" id="roleVendor"
                                    value="vendor">
                                <label class="form-check-label" for="roleVendor">Vendor</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="userRole" id="roleFuelStation"
                                    value="station">
                                <label class="form-check-label" for="roleFuelStation">Fuel Station</label>
                            </div>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="floatingInput" placeholder="Username">
                            <label for="floatingInput">Username</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="floatingPassword" placeholder="Password">
                            <label for="floatingPassword">Password</label>
                        </div>

                        <button class="w-100 btn btn-lg btn-primary my-3" type="submit">Log In</button>
                    </form>
                </main>
            </div>
        </div>
    </div>

    <script>
        fetch('http://localhost:3000/pucc_issued')
            .then(response => response.json())
            .then(data => {
                document.getElementById('total_pucc').innerText = data.count;
            });

        fetch('http://localhost:3000/vendor_registered')
            .then(response => response.json())
            .then(data => {
                document.getElementById('total_vendor').innerText = data.count;
            });

        fetch('http://localhost:3000/pucc_defaulter')
            .then(response => response.json())
            .then(data => {
                document.getElementById('pucc_defaulter').innerText = data.count;
            });

         fetch('http://localhost:3000/pucc_num_type')
            .then(response => response.json())
            .then(data => {
                document.getElementById('pucc_num_petrol').innerText = data.petrol;
                document.getElementById('pucc_num_diesel').innerText = data.diesel;
                document.getElementById('pucc_num_cng').innerText = data.cng;
            });
    </script>
